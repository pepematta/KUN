function minutesBeforeLabel(minutes) {
  if (Number(minutes) === 60) return '1 hora antes';
  if (Number(minutes) === 120) return '2 horas antes';
  return `${minutes} min antes`;
}

    ...lactarioReservations.map(time => ({
      kind: 'message',
      title: 'Recordatorio de reserva en lactario',
      desc: `Tienes un turno ${time}. Te avisaremos ${minutesBeforeLabel(lactarioReminderMinutes)}.`,
      time: 'Programado',
      color: KUN.sage,
      target: { tab: 'home', lactario: true },
    })),
    ...recommendations.map(r => ({
      kind: r.kind || 'capsule',
      title: r.title || 'Cápsula recomendada por el equipo',
      desc: r.desc || r.title,
      time: r.time || 'Nueva',
      color: r.color || KUN.brick,
      target: r.target || { capsuleId: r.id },
    })),
    ...NOTIFICATIONS,
  ];
  return (
    <div style={{
      position:'absolute', inset: 0, zIndex: 200,
      background: KUN.bg,
      display:'flex', flexDirection:'column',

      <div style={{ padding: '60px 20px 14px', display:'flex', alignItems:'center', gap: 12 }}>
        <div onClick={onClose} style={{
          width: 40, height: 40, borderRadius: 20, background: '#fff',
          display:'flex', alignItems:'center', justifyContent:'center',
          border: `1px solid ${KUN.hair}`, cursor:'pointer',
        }}>
          <svg width="20" height="20" viewBox="0 0 20 20" fill="none">
            <path d="M12 4L6 10L12 16" stroke={KUN.ink} strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"/>
          </svg>
        </div>
        <div style={{ flex: 1 }}>
          <div style={{ fontFamily: 'Quicksand, sans-serif', fontSize: 22, fontWeight: 700, color: KUN.ink, letterSpacing: -0.3 }}>
            Notificaciones
          </div>
          <div style={{ fontSize: 12, color: KUN.inkMuted, fontWeight: 500, marginTop: 2, letterSpacing: 0.2 }}>
            {items.length} nuevas hoy
          </div>
        </div>
      </div>

      <div style={{ flex: 1, overflowY:'auto', padding: '0 20px 30px' }}>
        {items.map((it, i) => (
          <div key={i} onClick={() => onOpenItem && onOpenItem(it)} style={{
            background:'#fff', borderRadius: 22, padding: '14px 16px',

              <div style={{
                fontFamily: 'Quicksand, sans-serif',
                fontSize: 10.5, color: KUN.inkMuted, fontWeight: 600,
                marginTop: 6, letterSpacing: 0.5, textTransform: 'uppercase',
              }}>{it.time}</div>

          </div>
        ))}

}

function SettingsPanel({ authData, onSave, onClose, onLogout, lactarioReminderMinutes = 60, onReminderChange }) {
  const [parentName, setParentName] = React.useState(authData?.parentName || '');
  const [babyName,   setBabyName]   = React.useState(authData?.babyName   || '');
  const [familyRole, setFamilyRole] = React.useState(authData?.familyRole || 'parent');
  const [reminder, setReminder] = React.useState(String(lactarioReminderMinutes || 60));

  const handleSave = () => {
    onReminderChange && onReminderChange(Number(reminder));
    onSave({ parentName: parentName.trim(), babyName: babyName.trim(), familyRole });
    onClose();
  };

  const inputStyle = {
    width: '100%', boxSizing: 'border-box',
    padding: '14px 16px', borderRadius: 16, border: `1.5px solid ${KUN.hair}`,
    fontSize: 15, fontWeight: 500, color: KUN.ink,
    background: '#fff', outline: 'none',
    fontFamily: 'Poppins, sans-serif',
  };
  const labelStyle = {
    fontFamily: 'Poppins, sans-serif',
    fontSize: 11, fontWeight: 500, color: KUN.inkMuted,
    letterSpacing: 0.8, marginBottom: 8, display:'block', textTransform:'uppercase',
  };

  return (
    <div style={{
      position:'absolute', inset: 0, zIndex: 200,
      background: KUN.bg,
      display:'flex', flexDirection:'column',
    }}>
      {/* header */}
      <div style={{ padding: '60px 20px 14px', display:'flex', alignItems:'center', gap: 12 }}>
        <div onClick={onClose} style={{
          width: 40, height: 40, borderRadius: 20, background: '#fff',
          display:'flex', alignItems:'center', justifyContent:'center',
          border: `1px solid ${KUN.hair}`, cursor:'pointer', flexShrink: 0,
        }}>
          <svg width="20" height="20" viewBox="0 0 20 20" fill="none">
            <path d="M12 4L6 10L12 16" stroke={KUN.ink} strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"/>
          </svg>
        </div>
        <div>
          <div style={{ fontFamily: 'Quicksand, sans-serif', fontSize: 22, fontWeight: 700, color: KUN.ink, letterSpacing: -0.3 }}>Ajustes</div>
          <div style={{ fontSize: 12, color: KUN.inkMuted, fontWeight: 500, marginTop: 2, letterSpacing: 0.2 }}>Perfil y sesión</div>
        </div>
      </div>

      <div style={{ flex: 1, overflowY:'auto', padding: '8px 20px 30px', display:'flex', flexDirection:'column', gap: 12 }}>

        {/* Profile card */}
        <div style={{
          background: '#fff', borderRadius: 24, padding: '22px 20px',
          border: `1px solid ${KUN.hair}`,
          display:'flex', flexDirection:'column', gap: 18,
        }}>
          <div style={{ fontFamily: 'Quicksand, sans-serif', fontSize: 16, fontWeight: 700, color: KUN.ink, letterSpacing: -0.1 }}>Información personal</div>

          <div>
            <label style={labelStyle}>TU NOMBRE</label>
            <input
              style={inputStyle}
              type="text"
              placeholder="¿Cómo te llamas?"
              value={parentName}
              onChange={e => setParentName(e.target.value)}
            />
          </div>

          <div>
            <label style={labelStyle}>NOMBRE DE TU BEBÉ</label>
            <input
              style={inputStyle}
              type="text"
              placeholder="Nombre del bebé"
              value={babyName}
              onChange={e => setBabyName(e.target.value)}
            />
          </div>

          <div>
            <label style={labelStyle}>RUT DEL RECIÉN NACIDO</label>
            <div style={{
              padding: '14px 16px', borderRadius: 16,
              background: KUN.cardSoft,
              fontFamily: 'Poppins, sans-serif',
              fontSize: 14, fontWeight: 500, color: KUN.inkMuted,
              letterSpacing: 0.2,
            }}>
              {authData?.rut || '—'}
            </div>
          </div>

          <div>
            <label style={labelStyle}>PARENTESCO</label>
            <select
              style={inputStyle}
              value={familyRole}
              onChange={e => setFamilyRole(e.target.value)}

              <option value="abuela">Abuela</option>
              <option value="abuelo">Abuelo</option>
              <option value="family">Otro familiar</option>
              <option value="external">Invitado externo</option>
            </select>
          </div>

          <div>
            <label style={labelStyle}>RECORDATORIO LACTARIO</label>
            <select
              style={inputStyle}
              value={reminder}
              onChange={e => setReminder(e.target.value)}
            >
              <option value="15">15 min antes</option>
              <option value="30">30 min antes</option>
              <option value="60">1 hora antes</option>
              <option value="120">2 horas antes</option>
            </select>
          </div>
        </div>

        {/* Save button */}
        <button onClick={handleSave} style={{
          width: '100%', padding: '14px', borderRadius: 999, border: 'none',
          background: KUN.brick, color: '#fff',
          fontFamily: 'Quicksand, sans-serif',
          fontSize: 15, fontWeight: 700, letterSpacing: -0.1,
          cursor:'pointer',
        }}>
          Guardar cambios
        </button>

        {/* Logout */}
        <div style={{
          background: '#fff', borderRadius: 22, padding: '4px 8px',
          border: `1px solid ${KUN.hair}`,
        }}>
          <div onClick={onLogout} style={{
            display:'flex', alignItems:'center', gap: 14, padding: '14px 10px',
            cursor:'pointer',
          }}>
            <div style={{
              width: 42, height: 42, borderRadius: 14,
              background: '#FEF0EE',
              display:'flex', alignItems:'center', justifyContent:'center', flexShrink: 0,
            }}>
              <svg width="20" height="20" viewBox="0 0 24 24" fill="none">
                <path d="M15 12H3M3 12L7 8M3 12L7 16" stroke="#D94F3D" strokeWidth="1.8" strokeLinecap="round" strokeLinejoin="round"/>
                <path d="M9 7V5C9 4.4 9.4 4 10 4H20C20.6 4 21 4.4 21 5V19C21 19.6 20.6 20 20 20H10C9.4 20 9 19.6 9 19V17" stroke="#D94F3D" strokeWidth="1.8" strokeLinecap="round"/>
              </svg>
            </div>
            <div>
              <div style={{ fontFamily: 'Quicksand, sans-serif', fontSize: 15, fontWeight: 700, color: '#D94F3D' }}>Cerrar sesión</div>
              <div style={{ fontSize: 12, color: KUN.inkMuted, fontWeight: 500, marginTop: 1, letterSpacing: 0.2 }}>
                RUT recién nacido {authData?.rut}
              </div>
            </div>
          </div>
        </div>

      </div>
    </div>
  );
}

function Prototype() {
  // Auth: read persisted session on first render. If no active session, show login.
  const [authData, setAuthData] = useState(() => {
    const stored = (typeof window.KAuth !== 'undefined') ? window.KAuth.load() : null;
    return (stored && stored.sessionActive) ? stored : null;
  });

  // Tour: tied to each user's authData (not a global flag)
  // so a new user always sees the tour even on the same device.
  const [tourDone, setTourDone] = useState(() => !!authData?.tourDone);

  // Reset when a different user logs in/out
  React.useEffect(() => {
    setTourDone(!!authData?.tourDone);
    setBabyStatusDone(!!authData?.babyStatusDone);
  }, [authData?.rut]);

  const [tab, setTab] = useState('home');         // home | edu | bond | comm
  const [eduSub, setEduSub] = useState('camino'); // camino | perso | biblio
  const [bondView, setBondView] = useState('entry'); // entry | journey | activities
  const [recordings, setRecordings] = useState([]);
  const [notifOpen, setNotifOpen] = useState(false);
  const [settingsOpen, setSettingsOpen] = useState(false);
  const [capsulaOpen, setCapsulaOpen] = useState(false);
  const [capsuleId, setCapsuleId] = useState(1);
  const [lactarioOpen,        setLactarioOpen]        = useState(false);
  const [lactarioReservation, setLactarioReservation] = useState([]);
  const [lactarioReminderMinutes, setLactarioReminderMinutesState] = useState(() => {
    try {
      return Number(localStorage.getItem('kun_lactario_reminder_minutes_v1') || 60);
    } catch {
      return 60;
    }
  });
  const [completedCapsulas, setCompletedCapsulas] = useState([]);
  const [quizResults, setQuizResults] = useState({});
  const [babyStatus, setBabyStatus] = useState(() => {
    try { return JSON.parse(localStorage.getItem('kun_baby_status_v1') || 'null'); }
    catch { return null; }
  });
  const [babyStatusDone, setBabyStatusDone] = useState(() => !!authData?.babyStatusDone);
  const [babyStatusEditOpen, setBabyStatusEditOpen] = useState(false);
  const [forumQuestions, setForumQuestions] = useState([]);
  const [forumReplyNotifications, setForumReplyNotifications] = useState([]);
  const [communityStart, setCommunityStart] = useState({ focusQuestionId: null });
  const [forumReports, setForumReports] = useState(() => {
    try {
      return JSON.parse(localStorage.getItem('kun_forum_reports_v1') || '[]');
    } catch {
      return [];
    }
  });
  const [careFeedback, setCareFeedback] = useState(() => {
    try {
      return JSON.parse(localStorage.getItem('kun_care_feedback_v1') || '[]');
    } catch {
      return [];
    }
  });
  const [clinicalRecommendations, setClinicalRecommendations] = useState(() => {
    try {
      return JSON.parse(localStorage.getItem('kun_clinical_recommendations_v1') || '{}');
    } catch {
      return {};
    }
  });
  // Tracks where the user was before opening a capsule, so we can return there
  const [capsuleSource, setCapsuleSource] = useState({ tab: 'edu', sub: 'camino' });
  const addRecording = (r) => setRecordings(prev => [r, ...prev]);

  const clinicalBabies = (() => {
    try {
      return JSON.parse(localStorage.getItem('kun_staff_babies_v1') || '[]');
    } catch {
      return [];
    }
  })();
  const linkedClinicalBaby = clinicalBabies.find(b => b.occupied && b.rut === authData?.rut);

  // Derived names (with fallbacks)
  const parentName = authData?.parentName || '';
  const babyName   = linkedClinicalBaby?.babyName || authData?.babyName || 'Sofía';
  const childLabel = linkedClinicalBaby?.sex === 'f' ? 'hija' : 'hijo';
  const parentRecommendations = clinicalRecommendations[authData?.rut] || [];

  const setLactarioReminderMinutes = (minutes) => {
    setLactarioReminderMinutesState(minutes);
    try { localStorage.setItem('kun_lactario_reminder_minutes_v1', String(minutes)); } catch {}
  };

  const scheduleLactarioReminder = (time) => {
    if (typeof Notification !== 'undefined' && Notification.permission === 'default') {
      Notification.requestPermission().catch(() => {});
    }
    const [start] = time.split(' - ');
    const [hh, mm] = start.split(':').map(Number);
    const target = new Date();
    target.setHours(hh, mm, 0, 0);
    target.setMinutes(target.getMinutes() - lactarioReminderMinutes);
    const delay = target.getTime() - Date.now();
    if (delay <= 0 || delay > 24 * 60 * 60 * 1000) return;
    window.setTimeout(() => {
      if (typeof Notification !== 'undefined' && Notification.permission === 'granted') {
        new Notification('Reserva de lactario', { body: `Tu turno ${time} comienza pronto.` });
      }
    }, delay);
  };

  const reserveLactarioSlot = (time) => {
    setLactarioReservation(prev => {
      const current = Array.isArray(prev) ? prev : (prev ? [prev] : []);
      if (current.includes(time) || current.length >= 4) return current;
      return [...current, time];
    });
    scheduleLactarioReminder(time);
  };

  const cancelLactarioSlot = (time) => {
    setLactarioReservation(prev => {
      const current = Array.isArray(prev) ? prev : (prev ? [prev] : []);
      if (!time) return [];
      return current.filter(slot => slot !== time);
    });
  };

  const saveSettings = ({ parentName: pn, babyName: bn, familyRole }) => {
    const updated = { ...authData, parentName: pn, babyName: bn, familyRole };
    if (typeof window.KAuth !== 'undefined') window.KAuth.save(updated);
    setAuthData(updated);
  };

  const saveBabyStatus = (status) => {
    setBabyStatus(status);
    try { localStorage.setItem('kun_baby_status_v1', JSON.stringify(status)); } catch {}
    const updated = { ...authData, babyStatusDone: true };
    if (typeof window.KAuth !== 'undefined') window.KAuth.save(updated);
    setAuthData(updated);
    setBabyStatusDone(true);
  };

  const skipBabyStatus = () => {
    const updated = { ...authData, babyStatusDone: true };
    if (typeof window.KAuth !== 'undefined') window.KAuth.save(updated);
    setAuthData(updated);
    setBabyStatusDone(true);
  };

  const handleLogout = () => {
    if (typeof window.KAuth !== 'undefined') window.KAuth.clear();
    setAuthData(null);
    setSettingsOpen(false);
  };

  const saveClinicalRecommendations = (next) => {
    setClinicalRecommendations(next);
    try { localStorage.setItem('kun_clinical_recommendations_v1', JSON.stringify(next)); } catch {}
  };

  const handleRecommendCapsule = (baby, cap) => {
    if (!baby?.rut || !cap?.id) return;
    const existing = clinicalRecommendations[baby.rut] || [];
    const nextForRut = [
      { id: cap.id, title: cap.title, topic: cap.topic, recommendedAt: Date.now(), babyName: baby.babyName },
      ...existing.filter(item => item.id !== cap.id),
    ];
    saveClinicalRecommendations({ ...clinicalRecommendations, [baby.rut]: nextForRut });
  };

  const handleStaffAnswerQuestion = (questionId, text) => {
    const question = forumQuestions.find(q => q.id === questionId);
    setForumQuestions(prev => prev.map(q => q.id === questionId ? {
      ...q,
      staffAnswer: text,
      answers: [
        ...(q.answers || []),
        { author: 'Equipo KUN', role: 'Personal médico', color: KUN.apple, text, time: 'Ahora', staff: true },
      ],
    } : q));
    setForumReplyNotifications(prev => [
      {
        id: `reply-${questionId}-${Date.now()}`,
        kind: 'community',
        title: 'Respondieron tu pregunta',
        desc: question?.title || 'El equipo respondio en el foro.',
        time: 'Nueva',
        color: '#7AA8B8',
        target: { tab: 'comm', questionId },
      },
      ...prev,
    ]);
  };

  const handleStaffRemoveQuestion = (questionId) => {
    setForumQuestions(prev => prev.filter(q => q.id !== questionId));
  };

  const saveForumReports = (next) => {
    setForumReports(next);
    try { localStorage.setItem('kun_forum_reports_v1', JSON.stringify(next)); } catch {}
  };

  const handleParentReportSubmit = (report) => {
    saveForumReports([
      { ...report, id: `report-${Date.now()}`, createdAt: Date.now() },
      ...forumReports,
    ]);
  };

  const saveCareFeedback = (next) => {
    setCareFeedback(next);
    try { localStorage.setItem('kun_care_feedback_v1', JSON.stringify(next)); } catch {}
  };

  const handleCareFeedbackSubmit = (feedback) => {
    saveCareFeedback([
      {
        ...feedback,
        id: `care-feedback-${Date.now()}`,
        rut: authData?.rut,
        createdAt: Date.now(),
      },
      ...careFeedback,
    ]);
  };

  // Called when user completes or skips the tour — saves flag per user
  const handleTourDone = () => {
    const updated = { ...authData, tourDone: true };
    if (typeof window.KAuth !== 'undefined') window.KAuth.save(updated);
    setAuthData(updated);
    setTourDone(true);
    setCapsulaOpen(false);
    setLactarioOpen(false);
    setTab('home');
    setEduSub('camino');
    setBondView('entry');
  };

  const goToEdu = (sub = 'camino') => {
    setEduSub(sub);
    setTab('edu');
  };

  const openCapsula = (id = 1) => {
    setCapsuleSource({ tab, sub: eduSub }); // remember where we came from
    setCapsuleId(id);
    setCapsulaOpen(true);
  };
  const closeCapsula = () => {
    setCapsulaOpen(false);
    setTab(capsuleSource.tab);
    if (capsuleSource.tab === 'edu') setEduSub(capsuleSource.sub);
  };
  const markCapsulaCompleted = (id = capsuleId) => {
    setCompletedCapsulas(prev => [id, ...prev.filter(doneId => doneId !== id)]);
  };
  const completeCapsula = () => {
    markCapsulaCompleted();
    setCapsulaOpen(false);
    setTab(capsuleSource.tab);
    if (capsuleSource.tab === 'edu') setEduSub(capsuleSource.sub);
  };
  const publishCapsulaQuestion = ({ text, capsuleTitle, capsuleId: publishedCapsuleId }) => {
    const id = `capsula-${publishedCapsuleId || capsuleId}-${Date.now()}`;
    markCapsulaCompleted(publishedCapsuleId || capsuleId);
    setForumQuestions(prev => [{
      id,
      author: parentName || 'Tú',
      authorColor: KUN.rosehip,
      role: `Familia de ${babyName || 'tu guagüa'}`,
      category: 'Cápsula educativa',
      title: `Duda sobre ${capsuleTitle || 'esta cápsula'}`,
      text,
      time: 'Ahora',
      likes: 0,
      replies: 0,
      answers: [],
      fresh: true,
    }, ...prev]);
    setCommunityStart({ focusQuestionId: id });
    setCapsulaOpen(false);
    setTab('comm');
  };
  const saveQuizResult = (result) => {
    setQuizResults(prev => ({
      ...prev,
      [capsuleId]: {
        ...result,
        answeredAt: new Date().toISOString(),
      },
    }));
  };

  const openNotificationItem = (item) => {
    const target = item?.target || {};
    setNotifOpen(false);
    setSettingsOpen(false);
    setCapsulaOpen(false);
    setLactarioOpen(false);

    if (target.capsuleId) {
      setCapsuleSource({ tab: 'edu', sub: 'biblio' });
      setCapsuleId(target.capsuleId);
      setCapsulaOpen(true);
      setTab('edu');
      setEduSub('biblio');
      return;
    }
    if (target.tab === 'edu') {
      setTab('edu');
      setEduSub(target.eduSub || 'camino');
      return;
    }
    if (target.tab === 'comm') {
      if (target.questionId) setCommunityStart({ focusQuestionId: target.questionId });
      setTab('comm');
      return;
    }
    if (target.tab === 'bond') {
      setTab('bond');
      setBondView(target.bondView || 'entry');
      return;
    }
    setTab('home');
    if (target.lactario) setLactarioOpen(true);
  };

  const renderEdu = () => {
    if (eduSub === 'camino') return <ScreenCamino onOpenCapsula={openCapsula} completedCapsulas={completedCapsulas} parentName={parentName} babyName={babyName} babyStatus={babyStatus} careFeedback={careFeedback} onSubmitCareFeedback={handleCareFeedbackSubmit} />;
    if (eduSub === 'perso')  return <ScreenPersonalizado onOpenCapsula={openCapsula} completedCapsulas={completedCapsulas} quizResults={quizResults} onGoToBiblio={() => goToEdu('biblio')} />;
    return <ScreenBiblioteca onOpenCapsula={openCapsula} completedCapsulas={completedCapsulas} />;
  };

  let body, hasSubtabs = false;
  if (capsulaOpen) {
    body = <ScreenCapsula
      capsuleId={capsuleId}
      onBack={closeCapsula}
      onComplete={completeCapsula}
      quizResult={quizResults[capsuleId]}
      onQuizAnswer={saveQuizResult}
      onPublishForum={publishCapsulaQuestion}
    />;
  } else if (tab === 'home' && lactarioOpen) {
    body = <ScreenLactario
      reservation={lactarioReservation}
      onReserve={reserveLactarioSlot}
      onCancel={cancelLactarioSlot}
      onBack={() => setLactarioOpen(false)}
      reminderMinutes={lactarioReminderMinutes}
    />;
  } else if (tab === 'home') {
    body = <ScreenHome
      onGoToEdu={() => goToEdu('biblio')} onGoToCapsula={openCapsula}
      parentName={parentName} babyName={babyName}
      lactarioReservation={lactarioReservation}
      completedCapsulas={completedCapsulas}
      onOpenLactario={() => setLactarioOpen(true)}
      onCancelLactario={cancelLactarioSlot}
      babyStatus={babyStatus}
      onEditBabyStatus={() => setBabyStatusEditOpen(true)}
    />;
  } else if (tab === 'edu') {
    hasSubtabs = true;
    body = renderEdu();
  } else if (tab === 'bond') {
    body = <ScreenVinculo
      view={bondView} setView={setBondView}
      recordings={recordings} addRecording={addRecording}
      babyName={babyName}
      canEditDiary={authData.role === 'parent' && (authData.familyRole || 'parent') === 'parent'}
    />;
  } else {
    body = <ScreenComunidad
      focusQuestionId={communityStart.focusQuestionId}
      questions={forumQuestions}
      currentUser={parentName}
      onReportSubmit={handleParentReportSubmit}
    />;
  }

  const screenLabel =
    tab === 'home' ? '01 Inicio'
    : tab === 'edu' ? `02 Educación · ${eduSub === 'camino' ? 'Cuidados básicos' : eduSub === 'perso' ? `Especial para mi ${childLabel}` : 'Aprender más'}`
    : tab === 'bond' ? `03 Vínculo · ${bondView === 'entry' ? 'Inicio' : bondView === 'journey' ? 'Diario de vida' : 'Actividades con mi hijo'}`
    : '04 Comunidad';

  return (
    <div data-screen-label={screenLabel} className="kun-device" style={{
      width: 390, height: 844,
      background: KUN.bg,
      borderRadius: 54,
      position:'relative', overflow:'hidden',
      boxShadow: '0 40px 80px rgba(42,35,32,0.18), 0 0 0 1px rgba(42,35,32,0.08)',
      fontFamily: "'Poppins', system-ui, sans-serif",
      color: KUN.ink,
    }}>
      {/* dynamic island */}
      <div className="kun-island" style={{
        position:'absolute', top: 11, left:'50%', transform:'translateX(-50%)',
        width: 120, height: 34, borderRadius: 22, background:'#000', zIndex: 50,
      }}/>
      <KStatusBar />

      {!authData ? (
        <ScreenAuth onAuthenticated={setAuthData} />
      ) : authData.role === 'staff' ? (
        <ScreenStaffApp
          authData={authData}
          onLogout={handleLogout}
          parentQuestions={forumQuestions}
          forumReports={forumReports}
          careFeedback={careFeedback}
          onAnswerQuestion={handleStaffAnswerQuestion}
          onRemoveQuestion={handleStaffRemoveQuestion}
          onRecommendCapsule={handleRecommendCapsule}
        />
      ) : (
        <>
          <div className="kun-content-wrap" style={{
            height:'calc(100% - 50px)', overflow:'hidden',
            display:'flex', flexDirection:'column',
          }}>
            <KTopBar onBell={() => setNotifOpen(true)} hasNotif={parentRecommendations.length > 0 || lactarioReservation.length > 0 || NOTIFICATIONS.length > 0} onSettings={() => setSettingsOpen(true)} />
            {hasSubtabs && !capsulaOpen && <KSubTabs active={eduSub} onChange={setEduSub} />}
            <div key={capsulaOpen ? 'capsula' : (tab + '-' + eduSub + (lactarioOpen ? '-lact' : ''))} style={{
              flex: 1,
              overflow: capsulaOpen ? 'hidden' : 'auto',
              overflowX: 'hidden',
              paddingBottom: capsulaOpen ? 0 : 120,
              display: capsulaOpen ? 'flex' : undefined,
              flexDirection: capsulaOpen ? 'column' : undefined,
              animation: 'fade .25s ease-out forwards',
            }}>
              {body}
            </div>
          </div>

          <KBottomNav
            active={capsulaOpen ? capsuleSource.tab : tab}
            onChange={(t) => { setCapsulaOpen(false); setTab(t); }}
          />

          {notifOpen    && <NotificationsPanel
            recommendations={[...forumReplyNotifications, ...parentRecommendations]}
            lactarioReservations={Array.isArray(lactarioReservation) ? lactarioReservation : (lactarioReservation ? [lactarioReservation] : [])}
            lactarioReminderMinutes={lactarioReminderMinutes}
            onOpenItem={openNotificationItem}
            onClose={() => setNotifOpen(false)}
          />}
          {settingsOpen && <SettingsPanel
            authData={authData}
            onSave={saveSettings}
            onClose={() => setSettingsOpen(false)}
            onLogout={handleLogout}
            lactarioReminderMinutes={lactarioReminderMinutes}
            onReminderChange={setLactarioReminderMinutes}
          />}

          {/* Baby status onboarding — shown before the tour */}
          {authData.role !== 'staff' && !babyStatusDone && typeof window.ScreenBabyStatusOnboarding === 'function' && (
            <ScreenBabyStatusOnboarding
              babyName={babyName}
              onSave={saveBabyStatus}
              onSkip={skipBabyStatus}
            />
          )}

          {/* Welcome tour — overlaid on top of the real app so nav is visible through cutout */}
          {authData.role !== 'staff' && babyStatusDone && !tourDone && typeof window.ScreenTour === 'function' && (
            <ScreenTour
              onDone={handleTourDone}
              onStepChange={(t) => { setTab(t); setCapsulaOpen(false); }}
            />
          )}

          {/* Baby status edit overlay */}
          {babyStatusEditOpen && typeof window.ScreenBabyStatusEdit === 'function' && (
            <ScreenBabyStatusEdit
              babyName={babyName}
              currentStatus={babyStatus}
              onSave={(status) => { saveBabyStatus(status); setBabyStatusEditOpen(false); }}
              onBack={() => setBabyStatusEditOpen(false)}
            />
          )}
        </>
      )}

      {/* home indicator */}
      <div className="kun-home-indicator" style={{
        position:'absolute', bottom: 8, left: 0, right: 0,
        display:'flex', justifyContent:'center', pointerEvents:'none', zIndex: 100,
      }}>
        <div style={{ width: 134, height: 5, borderRadius: 3, background:'rgba(46,42,38,0.28)' }}/>
      </div>

      <style>{`
        @keyframes fade {
          from { opacity: 0; transform: translateY(4px); }
          to   { opacity: 1; transform: translateY(0); }
        }
      `}</style>
    </div>
  );
}

// Defer render until all babel scripts have had a chance to compile & execute
(function tryRender(attempts) {
  if (
    typeof window.ScreenAuth === 'function' &&
    typeof window.ScreenTour === 'function' &&
    typeof window.ScreenLactario === 'function' &&
    typeof window.ScreenBabyStatusOnboarding === 'function' &&
    typeof window.ScreenHome === 'function' &&
    typeof window.ScreenCamino === 'function' &&
    typeof window.ScreenPersonalizado === 'function' &&
    typeof window.ScreenBiblioteca === 'function' &&
    typeof window.ScreenVinculo === 'function' &&
    typeof window.ScreenComunidad === 'function' &&
    typeof window.ScreenCapsula === 'function' &&
    typeof window.ScreenStaffApp === 'function' &&
    typeof window.KUN !== 'undefined'
  ) {
    ReactDOM.createRoot(document.getElementById('root')).render(<Prototype />);
  } else if (attempts > 0) {
    setTimeout(() => tryRender(attempts - 1), 80);
  }
})(20);
</script>
</body>
</html>
