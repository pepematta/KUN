<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<meta name="theme-color" content="#FAF6F1" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-status-bar-style" content="default" />
<meta name="apple-mobile-web-app-title" content="KUN" />
<title>KUN</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Nunito:ital,wght@0,400;0,500;0,600;0,700;0,800;1,600;1,700&family=Quicksand:wght@400;500;600;700&family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
  html, body {
    margin: 0; padding: 0;
    background: #EDE6DC;
    font-family: 'Poppins', -apple-system, system-ui, sans-serif;
    -webkit-font-smoothing: antialiased;
  }
  body {
    min-height: 100vh;
    display: flex; align-items: center; justify-content: center;
    padding: 40px 20px;
    box-sizing: border-box;
  }
  /* hide scrollbar in chips */
  ::-webkit-scrollbar { display: none; }

  /* On real mobile devices, drop the desktop phone-frame mock and run full-bleed */
  @media (max-width: 500px) {
    html, body { background: #FAF6F1; height: 100%; }
    body { padding: 0 !important; align-items: stretch !important; justify-content: stretch !important; }
    .kun-device {
      width: 100vw !important;
      height: 100vh !important;
      height: 100dvh !important;
      border-radius: 0 !important;
      box-shadow: none !important;
      padding-top: env(safe-area-inset-top) !important;
      padding-bottom: env(safe-area-inset-bottom) !important;
      box-sizing: border-box !important;
    }
    .kun-island, .kun-status-bar, .kun-home-indicator { display: none !important; }
    .kun-content-wrap { height: 100% !important; }
  }
</style>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script type="text/babel" src="edu-shared.jsx?v=8"></script>
<script type="text/babel" src="screen-auth.jsx?v=6"></script>
<script type="text/babel" src="screen-tour.jsx?v=3"></script>
<script type="text/babel" src="screen-lactario.jsx?v=4"></script>
<script type="text/babel" src="screen-home.jsx?v=11"></script>
<script type="text/babel" src="edu-camino.jsx?v=6"></script>
<script type="text/babel" src="edu-personalizado.jsx?v=6"></script>
<script type="text/babel" src="edu-biblioteca.jsx?v=6"></script>
<script type="text/babel" src="screen-vinculo.jsx?v=7"></script>
<script type="text/babel" src="screen-comunidad.jsx?v=7"></script>
<script type="text/babel" src="screen-capsula.jsx?v=7"></script>
</head>
<body>
<div id="root"></div>

<script type="text/babel">
const { useState } = React;

function PlaceholderScreen({ title, subtitle, icon }) {
  return (
    <div style={{
      flex: 1, display:'flex', flexDirection:'column',
      alignItems:'center', justifyContent:'center',
      padding: '40px 32px', textAlign:'center', gap: 16,
    }}>
      <div style={{
        width: 96, height: 96, borderRadius: 32,
        background: KUN.accentSoft,
        display:'flex', alignItems:'center', justifyContent:'center',
      }}>{icon}</div>
      <div style={{ fontSize: 22, fontWeight: 800, color: KUN.ink, letterSpacing: -0.3 }}>
        {title}
      </div>
      <div style={{
        fontSize: 14, color: KUN.inkSoft, fontWeight: 500,
        lineHeight: 1.5, maxWidth: 280, textWrap:'pretty',
      }}>
        {subtitle}
      </div>
      <div style={{
        marginTop: 8, padding: '6px 14px', borderRadius: 999,
        background:'#fff', fontSize: 11, fontWeight: 800, color: KUN.accentDeep,
        letterSpacing: 0.6,
      }}>PRÓXIMAMENTE</div>
    </div>
  );
}

const NOTIFICATIONS = [
  { kind:'shift',     title:'Valentina Rojas inició su turno', desc:'Está cuidando a Sofía esta mañana.', time:'Hace 10 min', color: KUN.sage },
  { kind:'capsule',   title:'Nueva cápsula para ti',           desc:'Método canguro: cómo empezar.',     time:'Hace 1 h',    color: KUN.accent },
  { kind:'message',   title:'Mensaje de Juanita',              desc:'Te mando un artículo que te podría servir.', time:'Hace 2 h', color: KUN.sage },
  { kind:'progress',  title:'Camino actualizado',              desc:'Completaste "Entender los monitores".',     time:'Ayer', color: KUN.accent },
  { kind:'community', title:'Nueva pregunta en Comunidad',     desc:'Mariana preguntó sobre lactancia materna.', time:'Ayer', color: '#7AA8B8' },
];

const NOTIF_GLYPH = {
  shift:     (c) => (
    <svg width="18" height="18" viewBox="0 0 24 24" fill="none">
      <circle cx="12" cy="8.5" r="3.5" stroke={c} strokeWidth="1.7"/>
      <path d="M5 20C5 16.5 8 14 12 14C16 14 19 16.5 19 20" stroke={c} strokeWidth="1.7" strokeLinecap="round"/>
      <path d="M10 6.5H14M12 4.5V8.5" stroke={c} strokeWidth="1.4" strokeLinecap="round"/>
    </svg>
  ),
  capsule:   (c) => (
    <svg width="18" height="18" viewBox="0 0 24 24" fill="none">
      <path d="M5 5C5 4.4 5.4 4 6 4H12V21H6C5.4 21 5 20.6 5 20V5Z" stroke={c} strokeWidth="1.8" strokeLinejoin="round"/>
      <path d="M21 5C21 4.4 20.6 4 20 4H14V21H20C20.6 21 21 20.6 21 20V5Z" stroke={c} strokeWidth="1.8" strokeLinejoin="round"/>
    </svg>
  ),
  message:   (c) => (
    <svg width="18" height="18" viewBox="0 0 24 24" fill="none">
      <path d="M4 6C4 5 5 4 6 4H18C19 4 20 5 20 6V15C20 16 19 17 18 17H10L6 20V17C5 17 4 16 4 15V6Z" stroke={c} strokeWidth="1.7" strokeLinejoin="round"/>
    </svg>
  ),
  progress:  (c) => (
    <svg width="18" height="18" viewBox="0 0 16 16" fill="none">
      <path d="M3.5 8.2L6.5 11L12.5 4.8" stroke={c} strokeWidth="2.2" strokeLinecap="round" strokeLinejoin="round"/>
    </svg>
  ),
  community: (c) => (
    <svg width="20" height="18" viewBox="0 0 28 26" fill="none">
      <circle cx="9" cy="9" r="3.2" stroke={c} strokeWidth="1.8"/>
      <circle cx="19" cy="9.5" r="2.8" stroke={c} strokeWidth="1.8"/>
      <path d="M3 20C3 17 5.7 14.8 9 14.8C12.3 14.8 15 17 15 20" stroke={c} strokeWidth="1.8" strokeLinecap="round"/>
      <path d="M16 20C16 17.5 18 15.5 21 15.5C23.5 15.5 25 17 25 19" stroke={c} strokeWidth="1.8" strokeLinecap="round"/>
    </svg>
  ),
};

function NotificationsPanel({ onClose }) {
  return (
    <div style={{
      position:'absolute', inset: 0, zIndex: 200,
      background: KUN.bg,
      display:'flex', flexDirection:'column',
    }}>
      <div style={{ padding: '60px 20px 14px', display:'flex', alignItems:'center', gap: 12 }}>
        <div onClick={onClose} style={{
          width: 40, height: 40, borderRadius: 20, background: '#fff',
          display:'flex', alignItems:'center', justifyContent:'center',
          border: `1px solid ${KUN.hair}`, cursor:'pointer',
        }}>
          <svg width="20" height="20" viewBox="0 0 20 20" fill="none">
            <path d="M12 4L6 10L12 16" stroke={KUN.ink} strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"/>
          </svg>
        </div>
        <div style={{ flex: 1 }}>
          <div style={{ fontFamily: 'Quicksand, sans-serif', fontSize: 22, fontWeight: 700, color: KUN.ink, letterSpacing: -0.3 }}>
            Notificaciones
          </div>
          <div style={{ fontSize: 12, color: KUN.inkMuted, fontWeight: 500, marginTop: 2, letterSpacing: 0.2 }}>
            {NOTIFICATIONS.length} nuevas hoy
          </div>
        </div>
      </div>

      <div style={{ flex: 1, overflowY:'auto', padding: '0 20px 30px' }}>
        {NOTIFICATIONS.map((it, i) => (
          <div key={i} style={{
            background:'#fff', borderRadius: 22, padding: '14px 16px',
            marginBottom: 10, display:'flex', gap: 14, alignItems:'flex-start',
            border: `1px solid ${KUN.hair}`,
            cursor:'pointer',
          }}>
            <div style={{
              width: 42, height: 42, borderRadius: 14, background: it.color,
              display:'flex', alignItems:'center', justifyContent:'center', flexShrink: 0,
            }}>
              {NOTIF_GLYPH[it.kind]('#fff')}
            </div>
            <div style={{ flex: 1, minWidth: 0 }}>
              <div style={{
                fontFamily: 'Quicksand, sans-serif', fontSize: 14.5, fontWeight: 700,
                color: KUN.ink, letterSpacing: -0.1,
              }}>{it.title}</div>
              <div style={{
                fontSize: 12.5, color: KUN.inkSoft, fontWeight: 400,
                marginTop: 3, lineHeight: 1.5,
              }}>{it.desc}</div>
              <div style={{
                fontFamily: 'Quicksand, sans-serif',
                fontSize: 10.5, color: KUN.inkMuted, fontWeight: 600,
                marginTop: 6, letterSpacing: 0.5, textTransform: 'uppercase',
              }}>{it.time}</div>
            </div>
          </div>
        ))}
      </div>
    </div>
  );
}

function SettingsPanel({ authData, onSave, onClose, onLogout }) {
  const [parentName, setParentName] = React.useState(authData?.parentName || '');
  const [babyName,   setBabyName]   = React.useState(authData?.babyName   || '');

  const handleSave = () => {
    onSave({ parentName: parentName.trim(), babyName: babyName.trim() });
    onClose();
  };

  const inputStyle = {
    width: '100%', boxSizing: 'border-box',
    padding: '14px 16px', borderRadius: 16, border: `1.5px solid ${KUN.hair}`,
    fontSize: 15, fontWeight: 500, color: KUN.ink,
    background: '#fff', outline: 'none',
    fontFamily: 'Poppins, sans-serif',
  };
  const labelStyle = {
    fontFamily: 'Poppins, sans-serif',
    fontSize: 11, fontWeight: 500, color: KUN.inkMuted,
    letterSpacing: 0.8, marginBottom: 8, display:'block', textTransform:'uppercase',
  };

  return (
    <div style={{
      position:'absolute', inset: 0, zIndex: 200,
      background: KUN.bg,
      display:'flex', flexDirection:'column',
    }}>
      {/* header */}
      <div style={{ padding: '60px 20px 14px', display:'flex', alignItems:'center', gap: 12 }}>
        <div onClick={onClose} style={{
          width: 40, height: 40, borderRadius: 20, background: '#fff',
          display:'flex', alignItems:'center', justifyContent:'center',
          border: `1px solid ${KUN.hair}`, cursor:'pointer', flexShrink: 0,
        }}>
          <svg width="20" height="20" viewBox="0 0 20 20" fill="none">
            <path d="M12 4L6 10L12 16" stroke={KUN.ink} strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"/>
          </svg>
        </div>
        <div>
          <div style={{ fontFamily: 'Quicksand, sans-serif', fontSize: 22, fontWeight: 700, color: KUN.ink, letterSpacing: -0.3 }}>Ajustes</div>
          <div style={{ fontSize: 12, color: KUN.inkMuted, fontWeight: 500, marginTop: 2, letterSpacing: 0.2 }}>Perfil y sesión</div>
        </div>
      </div>

      <div style={{ flex: 1, overflowY:'auto', padding: '8px 20px 30px', display:'flex', flexDirection:'column', gap: 12 }}>

        {/* Profile card */}
        <div style={{
          background: '#fff', borderRadius: 24, padding: '22px 20px',
          border: `1px solid ${KUN.hair}`,
          display:'flex', flexDirection:'column', gap: 18,
        }}>
          <div style={{ fontFamily: 'Quicksand, sans-serif', fontSize: 16, fontWeight: 700, color: KUN.ink, letterSpacing: -0.1 }}>Información personal</div>

          <div>
            <label style={labelStyle}>TU NOMBRE</label>
            <input
              style={inputStyle}
              type="text"
              placeholder="¿Cómo te llamas?"
              value={parentName}
              onChange={e => setParentName(e.target.value)}
            />
          </div>

          <div>
            <label style={labelStyle}>NOMBRE DE TU BEBÉ</label>
            <input
              style={inputStyle}
              type="text"
              placeholder="Nombre del bebé"
              value={babyName}
              onChange={e => setBabyName(e.target.value)}
            />
          </div>

          <div>
            <label style={labelStyle}>RUT</label>
            <div style={{
              padding: '14px 16px', borderRadius: 16,
              background: KUN.cardSoft,
              fontFamily: 'Poppins, sans-serif',
              fontSize: 14, fontWeight: 500, color: KUN.inkMuted,
              letterSpacing: 0.2,
            }}>
              {authData?.rut || '—'}
            </div>
          </div>
        </div>

        {/* Save button */}
        <button onClick={handleSave} style={{
          width: '100%', padding: '14px', borderRadius: 999, border: 'none',
          background: KUN.brick, color: '#fff',
          fontFamily: 'Quicksand, sans-serif',
          fontSize: 15, fontWeight: 700, letterSpacing: -0.1,
          cursor:'pointer',
        }}>
          Guardar cambios
        </button>

        {/* Logout */}
        <div style={{
          background: '#fff', borderRadius: 22, padding: '4px 8px',
          border: `1px solid ${KUN.hair}`,
        }}>
          <div onClick={onLogout} style={{
            display:'flex', alignItems:'center', gap: 14, padding: '14px 10px',
            cursor:'pointer',
          }}>
            <div style={{
              width: 42, height: 42, borderRadius: 14,
              background: '#FEF0EE',
              display:'flex', alignItems:'center', justifyContent:'center', flexShrink: 0,
            }}>
              <svg width="20" height="20" viewBox="0 0 24 24" fill="none">
                <path d="M15 12H3M3 12L7 8M3 12L7 16" stroke="#D94F3D" strokeWidth="1.8" strokeLinecap="round" strokeLinejoin="round"/>
                <path d="M9 7V5C9 4.4 9.4 4 10 4H20C20.6 4 21 4.4 21 5V19C21 19.6 20.6 20 20 20H10C9.4 20 9 19.6 9 19V17" stroke="#D94F3D" strokeWidth="1.8" strokeLinecap="round"/>
              </svg>
            </div>
            <div>
              <div style={{ fontFamily: 'Quicksand, sans-serif', fontSize: 15, fontWeight: 700, color: '#D94F3D' }}>Cerrar sesión</div>
              <div style={{ fontSize: 12, color: KUN.inkMuted, fontWeight: 500, marginTop: 1, letterSpacing: 0.2 }}>
                RUT {authData?.rut}
              </div>
            </div>
          </div>
        </div>

      </div>
    </div>
  );
}

function Prototype() {
  // Auth: read persisted session on first render. If no active session, show login.
  const [authData, setAuthData] = useState(() => {
    const stored = (typeof window.KAuth !== 'undefined') ? window.KAuth.load() : null;
    return (stored && stored.sessionActive) ? stored : null;
  });

  // Tour: tied to each user's authData (not a global flag)
  // so a new user always sees the tour even on the same device.
  const [tourDone, setTourDone] = useState(() => !!authData?.tourDone);

  // Reset when a different user logs in/out
  React.useEffect(() => {
    setTourDone(!!authData?.tourDone);
  }, [authData?.rut]);

  const [tab, setTab] = useState('home');         // home | edu | bond | comm
  const [eduSub, setEduSub] = useState('camino'); // camino | perso | biblio
  const [bondView, setBondView] = useState('entry'); // entry | journey | songs
  const [recordings, setRecordings] = useState([]);
  const [notifOpen, setNotifOpen] = useState(false);
  const [settingsOpen, setSettingsOpen] = useState(false);
  const [capsulaOpen, setCapsulaOpen] = useState(false);
  const [capsuleId, setCapsuleId] = useState(1);
  const [lactarioOpen,        setLactarioOpen]        = useState(false);
  const [lactarioReservation, setLactarioReservation] = useState(null);
  const [completedCapsulas, setCompletedCapsulas] = useState([]);
  const [quizResults, setQuizResults] = useState({});
  // Tracks where the user was before opening a capsule, so we can return there
  const [capsuleSource, setCapsuleSource] = useState({ tab: 'edu', sub: 'camino' });
  const addRecording = (r) => setRecordings(prev => [r, ...prev]);

  // Derived names (with fallbacks)
  const parentName = authData?.parentName || '';
  const babyName   = authData?.babyName   || 'Sofía';

  const saveSettings = ({ parentName: pn, babyName: bn }) => {
    const updated = { ...authData, parentName: pn, babyName: bn };
    if (typeof window.KAuth !== 'undefined') window.KAuth.save(updated);
    setAuthData(updated);
  };

  const handleLogout = () => {
    if (typeof window.KAuth !== 'undefined') window.KAuth.clear();
    setAuthData(null);
    setSettingsOpen(false);
  };

  // Called when user completes or skips the tour — saves flag per user
  const handleTourDone = () => {
    const updated = { ...authData, tourDone: true };
    if (typeof window.KAuth !== 'undefined') window.KAuth.save(updated);
    setAuthData(updated);
    setTourDone(true);
  };

  const goToEdu = (sub = 'camino') => {
    setEduSub(sub);
    setTab('edu');
  };

  const openCapsula = (id = 1) => {
    setCapsuleSource({ tab, sub: eduSub }); // remember where we came from
    setCapsuleId(id);
    setCapsulaOpen(true);
  };
  const closeCapsula = () => {
    setCapsulaOpen(false);
    setTab(capsuleSource.tab);
    if (capsuleSource.tab === 'edu') setEduSub(capsuleSource.sub);
  };
  const completeCapsula = () => {
    setCompletedCapsulas(prev => [capsuleId, ...prev.filter(id => id !== capsuleId)]);
    setCapsulaOpen(false);
    // After completing, always go to Personalizado so user sees it in historial
    setTab('edu');
    setEduSub('perso');
  };
  const saveQuizResult = (result) => {
    setQuizResults(prev => ({
      ...prev,
      [capsuleId]: {
        ...result,
        answeredAt: new Date().toISOString(),
      },
    }));
  };

  const renderEdu = () => {
    if (eduSub === 'camino') return <ScreenCamino onOpenCapsula={openCapsula} completedCapsulas={completedCapsulas} parentName={parentName} babyName={babyName} />;
    if (eduSub === 'perso')  return <ScreenPersonalizado onOpenCapsula={openCapsula} completedCapsulas={completedCapsulas} quizResults={quizResults} onGoToBiblio={() => goToEdu('biblio')} />;
    return <ScreenBiblioteca onOpenCapsula={openCapsula} />;
  };

  let body, hasSubtabs = false;
  if (capsulaOpen) {
    body = <ScreenCapsula
      capsuleId={capsuleId}
      onBack={closeCapsula}
      onComplete={completeCapsula}
      quizResult={quizResults[capsuleId]}
      onQuizAnswer={saveQuizResult}
      onPublishForum={() => { setCapsulaOpen(false); setTab('comm'); }}
    />;
  } else if (tab === 'home' && lactarioOpen) {
    body = <ScreenLactario
      reservation={lactarioReservation}
      onReserve={(time) => setLactarioReservation(time)}
      onCancel={() => setLactarioReservation(null)}
      onBack={() => setLactarioOpen(false)}
    />;
  } else if (tab === 'home') {
    body = <ScreenHome
      onGoToEdu={() => goToEdu('biblio')} onGoToCapsula={openCapsula}
      parentName={parentName} babyName={babyName}
      lactarioReservation={lactarioReservation}
      onOpenLactario={() => setLactarioOpen(true)}
      onCancelLactario={() => setLactarioReservation(null)}
      onMessageNurse={() => setTab('comm')}
    />;
  } else if (tab === 'edu') {
    hasSubtabs = true;
    body = renderEdu();
  } else if (tab === 'bond') {
    body = <ScreenVinculo
      view={bondView} setView={setBondView}
      recordings={recordings} addRecording={addRecording}
    />;
  } else {
    body = <ScreenComunidad />;
  }

  const screenLabel =
    tab === 'home' ? '01 Inicio'
    : tab === 'edu' ? `02 Educación · ${eduSub === 'camino' ? 'Camino' : eduSub === 'perso' ? 'Personalizado' : 'Biblioteca'}`
    : tab === 'bond' ? `03 Vínculo · ${bondView === 'entry' ? 'Inicio' : bondView === 'journey' ? 'Nuestro viaje' : 'Cuentos y canciones'}`
    : '04 Comunidad';

  return (
    <div data-screen-label={screenLabel} className="kun-device" style={{
      width: 390, height: 844,
      background: KUN.bg,
      borderRadius: 54,
      position:'relative', overflow:'hidden',
      boxShadow: '0 40px 80px rgba(42,35,32,0.18), 0 0 0 1px rgba(42,35,32,0.08)',
      fontFamily: "'Poppins', system-ui, sans-serif",
      color: KUN.ink,
    }}>
      {/* dynamic island */}
      <div className="kun-island" style={{
        position:'absolute', top: 11, left:'50%', transform:'translateX(-50%)',
        width: 120, height: 34, borderRadius: 22, background:'#000', zIndex: 50,
      }}/>
      <KStatusBar />

      {!authData ? (
        <ScreenAuth onAuthenticated={setAuthData} />
      ) : (
        <>
          <div className="kun-content-wrap" style={{
            height:'calc(100% - 50px)', overflow:'hidden',
            display:'flex', flexDirection:'column',
          }}>
            <KTopBar onBell={() => setNotifOpen(true)} hasNotif onSettings={() => setSettingsOpen(true)} />
            {hasSubtabs && !capsulaOpen && <KSubTabs active={eduSub} onChange={setEduSub} />}
            <div key={capsulaOpen ? 'capsula' : (tab + '-' + eduSub + (lactarioOpen ? '-lact' : ''))} style={{
              flex: 1,
              overflow: capsulaOpen ? 'hidden' : 'auto',
              paddingBottom: capsulaOpen ? 0 : 120,
              display: capsulaOpen ? 'flex' : undefined,
              flexDirection: capsulaOpen ? 'column' : undefined,
              animation: 'fade .25s ease-out forwards',
            }}>
              {body}
            </div>
          </div>

          <KBottomNav
            active={capsulaOpen ? capsuleSource.tab : tab}
            onChange={(t) => { setCapsulaOpen(false); setTab(t); }}
          />

          {notifOpen    && <NotificationsPanel onClose={() => setNotifOpen(false)} />}
          {settingsOpen && <SettingsPanel authData={authData} onSave={saveSettings} onClose={() => setSettingsOpen(false)} onLogout={handleLogout} />}

          {/* Welcome tour — overlaid on top of the real app so nav is visible through cutout */}
          {!tourDone && typeof window.ScreenTour === 'function' && (
            <ScreenTour
              onDone={handleTourDone}
              onStepChange={(t) => { setTab(t); setCapsulaOpen(false); }}
            />
          )}
        </>
      )}

      {/* home indicator */}
      <div className="kun-home-indicator" style={{
        position:'absolute', bottom: 8, left: 0, right: 0,
        display:'flex', justifyContent:'center', pointerEvents:'none', zIndex: 100,
      }}>
        <div style={{ width: 134, height: 5, borderRadius: 3, background:'rgba(46,42,38,0.28)' }}/>
      </div>

      <style>{`
        @keyframes fade {
          from { opacity: 0; transform: translateY(4px); }
          to   { opacity: 1; transform: translateY(0); }
        }
      `}</style>
    </div>
  );
}

// Defer render until all babel scripts have had a chance to compile & execute
(function tryRender(attempts) {
  if (
    typeof window.ScreenAuth === 'function' &&
    typeof window.ScreenTour === 'function' &&
    typeof window.ScreenLactario === 'function' &&
    typeof window.ScreenHome === 'function' &&
    typeof window.ScreenCamino === 'function' &&
    typeof window.ScreenPersonalizado === 'function' &&
    typeof window.ScreenBiblioteca === 'function' &&
    typeof window.ScreenVinculo === 'function' &&
    typeof window.ScreenComunidad === 'function' &&
    typeof window.ScreenCapsula === 'function' &&
    typeof window.KUN !== 'undefined'
  ) {
    ReactDOM.createRoot(document.getElementById('root')).render(<Prototype />);
  } else if (attempts > 0) {
    setTimeout(() => tryRender(attempts - 1), 80);
  }
})(20);
</script>
</body>
</html>
